name: Register E2E pending statuses

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: register-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  register:
    name: Register
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Register pending statuses
      run: |
        PR_SHA="${{ github.event.pull_request.head.sha }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        matrix_json=$(python3 .github/e2e-matrix-generator.py -m pull_request 2>/dev/null | sed -n 's/^kindMatrix=//p')

        if [[ -z "$matrix_json" || "$matrix_json" == "null" ]]; then
          echo "No matrix entries generated — nothing to register"
          exit 0
        fi

        echo "Generated matrix: $matrix_json"

        echo "$matrix_json" | jq -c '.include[]' | while IFS= read -r job; do
          id=$(echo "$job" | jq -r '.id')
          echo "Registering pending status: E2E / $id"
          gh api "repos/${{ github.repository }}/statuses/$PR_SHA" \
            -f state="pending" \
            -f context="E2E / $id" \
            -f description="Pending approval — comment /test to run" \
            -f target_url="$RUN_URL" \
            --silent
        done
      env:
        GH_TOKEN: ${{ github.token }}
