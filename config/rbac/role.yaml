---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - pods
  - pods/status
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  - issuers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - clusterimagecatalogs
  - clusters
  - imagecatalogs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - clusters/finalizers
  verbs:
  - update
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - clusters/status
  verbs:
  - get
  - patch
  - update
